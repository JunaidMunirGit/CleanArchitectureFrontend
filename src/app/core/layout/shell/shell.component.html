<div class="shell">
  <mat-toolbar class="topbar">
    <button mat-icon-button (click)="menuOpen = !menuOpen" aria-label="Toggle menu">
      <mat-icon>menu</mat-icon>
    </button>
    <a routerLink="/dashboard" class="brand">
      <img src="assets/logo-full.svg" alt="Pospay" class="brand-logo" />
    </a>
    <span class="spacer"></span>
    <button mat-icon-button (click)="theme.toggle()" [attr.aria-label]="theme.isDark() ? 'Switch to light mode' : 'Switch to dark mode'" title="{{ theme.isDark() ? 'Light mode' : 'Dark mode' }}">
      <mat-icon>{{ theme.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User menu">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <div class="menu-user" mat-menu-item disabled>
        @if (user(); as u) {
          <span class="menu-name">{{ u.firstName }} {{ u.lastName }}</span>
          <span class="menu-email">{{ u.email }}</span>
        }
      </div>
      <button mat-menu-item (click)="auth.logout()">
        <mat-icon>logout</mat-icon>
        <span>Sign out</span>
      </button>
    </mat-menu>
  </mat-toolbar>

  @if (loading.isLoading()) {
    <mat-progress-bar mode="indeterminate" class="top-progress" />
  }

  <div class="body">
    <aside class="sidebar" [class.collapsed]="!menuOpen">
      <mat-nav-list>
        <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
          <mat-icon matListItemIcon>dashboard</mat-icon>
          <span matListItemTitle>Dashboard</span>
        </a>
        <a mat-list-item routerLink="/pos/order" routerLinkActive="active">
          <mat-icon matListItemIcon>point_of_sale</mat-icon>
          <span matListItemTitle>POS / New Order</span>
        </a>
        <a mat-list-item routerLink="/products" routerLinkActive="active">
          <mat-icon matListItemIcon>inventory_2</mat-icon>
          <span matListItemTitle>Products</span>
        </a>
        <a mat-list-item routerLink="/products/barcode" routerLinkActive="active">
          <mat-icon matListItemIcon>qr_code_scanner</mat-icon>
          <span matListItemTitle>Barcode lookup</span>
        </a>
        <a mat-list-item routerLink="/products/bulk" routerLinkActive="active">
          <mat-icon matListItemIcon>upload_file</mat-icon>
          <span matListItemTitle>Bulk import</span>
        </a>
        <a mat-list-item routerLink="/branches" routerLinkActive="active">
          <mat-icon matListItemIcon>store</mat-icon>
          <span matListItemTitle>Branches</span>
        </a>
      </mat-nav-list>
    </aside>
    <main class="content">
      <router-outlet />
    </main>
  </div>
</div>
