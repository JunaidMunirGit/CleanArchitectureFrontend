<div class="product-list">
  <mat-card class="page-card">
    <mat-card-header>
      <mat-card-title class="page-title">
        <mat-icon>inventory_2</mat-icon>
        <span>Products</span>
      </mat-card-title>
      <mat-card-subtitle>Manage your product catalog, search, and filter</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="toolbar">
        <div class="actions">
          <a mat-flat-button color="primary" routerLink="/products/new">
            <mat-icon>add</mat-icon>
            New Product
          </a>
          <a mat-stroked-button routerLink="/products/bulk">
            <mat-icon>upload_file</mat-icon>
            Bulk Import
          </a>
          <a mat-stroked-button routerLink="/products/barcode">
            <mat-icon>qr_code_scanner</mat-icon>
            Barcode Lookup
          </a>
        </div>
      </div>

      <div class="filters">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Search (name/SKU)</mat-label>
          <mat-icon matPrefix>search</mat-icon>
          <input matInput [(ngModel)]="searchQ" (keyup.enter)="onSearch()" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>SKU</mat-label>
          <input matInput [(ngModel)]="searchSku" (keyup.enter)="onSearch()" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Status</mat-label>
          <mat-select [(ngModel)]="filterActive">
            <mat-option [value]="undefined">All</mat-option>
            <mat-option [value]="true">Active</mat-option>
            <mat-option [value]="false">Inactive</mat-option>
          </mat-select>
        </mat-form-field>
        <button mat-flat-button color="primary" (click)="onSearch()">
          <mat-icon>search</mat-icon>
          Search
        </button>
        <button mat-stroked-button (click)="onRefresh()">
          <mat-icon>refresh</mat-icon>
          Refresh
        </button>
      </div>

      <app-product-list-table
        [items]="dataSource()"
        [totalCount]="(listResult()?.totalCount) ?? 0"
        [pageIndex]="pageIndex()"
        [pageSize]="pageSize()"
        [sortBy]="sortBy()"
        [sortDir]="sortDir()"
        (page)="onPage($event)"
        (sort)="onSort($event.sortBy, $event.sortDir)"
      ></app-product-list-table>
    </mat-card-content>
  </mat-card>
</div>
