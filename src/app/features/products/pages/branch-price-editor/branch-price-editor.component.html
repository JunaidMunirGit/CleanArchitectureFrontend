<mat-card>
  <mat-card-header>
    <mat-card-title>Branch prices</mat-card-title>
    @if (product(); as p) {
      <mat-card-subtitle>{{ p.name }} ({{ p.sku }})</mat-card-subtitle>
    }
  </mat-card-header>
  <mat-card-content>
    <div class="add-row">
      <mat-form-field appearance="outline">
        <mat-label>Branch ID</mat-label>
        <input matInput [(ngModel)]="newBranchId" placeholder="GUID" />
      </mat-form-field>
      <mat-form-field appearance="outline">
        <mat-label>Price</mat-label>
        <input matInput type="number" [(ngModel)]="newPrice" min="0" step="0.01" />
      </mat-form-field>
      <button
        mat-flat-button
        color="primary"
        (click)="addPrice()"
        [disabled]="!newBranchId.trim() || savingBranchId !== null"
      >
        {{ savingBranchId ? 'Saving...' : 'Set price' }}
      </button>
    </div>

    <table mat-table [dataSource]="prices()">
      <ng-container matColumnDef="branchName">
        <th mat-header-cell *matHeaderCellDef>Branch</th>
        <td mat-cell *matCellDef="let row">{{ row.branchName ?? 'Default' }}</td>
      </ng-container>
      <ng-container matColumnDef="price">
        <th mat-header-cell *matHeaderCellDef>Price</th>
        <td mat-cell *matCellDef="let row">{{ row.price | number: '1.2-2' }}</td>
      </ng-container>
      <ng-container matColumnDef="effectiveFrom">
        <th mat-header-cell *matHeaderCellDef>From</th>
        <td mat-cell *matCellDef="let row">{{ row.effectiveFrom | date: 'short' }}</td>
      </ng-container>
      <ng-container matColumnDef="effectiveTo">
        <th mat-header-cell *matHeaderCellDef>To</th>
        <td mat-cell *matCellDef="let row">{{ row.effectiveTo ? (row.effectiveTo | date: 'short') : '-' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns; trackBy: trackByBranch"></tr>
    </table>

    <div class="back">
      <a mat-button [routerLink]="['/products']">Back to list</a>
    </div>
  </mat-card-content>
</mat-card>
